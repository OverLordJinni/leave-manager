# .github/workflows/keep-alive.yml
# Prevents Supabase free tier pausing (pauses after 7 days inactivity)
# Also pings the Render backend to keep it warm (Render free tier spins down after 15 min)
#
# Setup:
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#   Add these secrets:
#     SUPABASE_URL          — your Supabase project URL
#     SUPABASE_SERVICE_KEY  — your Supabase service role key
#     RENDER_BACKEND_URL    — your Render backend URL e.g. https://your-app.onrender.com

name: Keep services alive

on:
  schedule:
    # Runs every 3 days at 08:00 UTC — well within Supabase's 7-day limit
    - cron: '0 8 */3 * *'
  workflow_dispatch: # allows manual trigger from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase (keep alive)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Pinging Supabase..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/settings?select=key&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")
          echo "Supabase responded: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Unexpected status from Supabase: $STATUS"
            exit 1
          fi
          echo "✅ Supabase is alive"

      - name: Ping Render backend (keep warm)
        env:
          RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          echo "Pinging Render backend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${RENDER_BACKEND_URL}/health" \
            --max-time 60)
          echo "Render responded: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Unexpected status from Render: $STATUS"
          else
            echo "✅ Render backend is alive"
          fi
