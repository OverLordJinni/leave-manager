# Netlify configuration — security headers (fixes F-01)

[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy     = "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'; object-src 'none'"
    X-Frame-Options             = "DENY"
    X-Content-Type-Options      = "nosniff"
    Referrer-Policy             = "strict-origin-when-cross-origin"
    Permissions-Policy          = "camera=(), microphone=(), geolocation=(), payment=()"

# Cache static assets aggressively, HTML never
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# Proxy /api/* to Render backend — makes cookies same-origin, fixes cross-origin cookie blocking
[[redirects]]
  from   = "/api/*"
  to     = "https://leave-manager-9zdl.onrender.com/api/:splat"
  status = 200
  force  = true

# Proxy /health to Render backend
[[redirects]]
  from   = "/health"
  to     = "https://leave-manager-9zdl.onrender.com/health"
  status = 200
  force  = true

# SPA routing — all paths serve index.html (must be last)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
